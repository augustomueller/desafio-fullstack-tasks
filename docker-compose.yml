services:
  db:
    image: postgres:16-alpine
    container_name: tasks_db
    restart: always
    environment:
      POSTGRES_USER: user_tasks
      POSTGRES_PASSWORD: password_tasks
      POSTGRES_DB: tasks_management
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - sellflux_tasks_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_tasks -d tasks_management"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: tasks_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      DB_USER: user_tasks
      DB_PASSWORD: password_tasks
      DB_NAME: tasks_management
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "3001:3001"

volumes:
  sellflux_tasks_data:
